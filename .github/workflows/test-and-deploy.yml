name: 🧪 Тестирование и деплой

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Клонирование репозитория
      uses: actions/checkout@v4
      
    - name: 🐍 Настройка Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        
    - name: 📦 Установка зависимостей
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        
    - name: 🔧 Настройка базы данных
      run: |
        python manage.py makemigrations
        python manage.py migrate
        
    - name: 🧪 Запуск тестов
      run: |
        python manage.py test --verbosity=2
        
    - name: 🔍 Проверка кода
      run: |
        python -m flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        python -m flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        
  security-check:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: 📥 Клонирование репозитория
      uses: actions/checkout@v4
      
    - name: 🐍 Настройка Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        
    - name: 🔒 Проверка безопасности
      run: |
        python -m pip install --upgrade pip
        pip install safety bandit
        safety check
        bandit -r . -f json -o bandit-report.json || true
        
    - name: 📊 Загрузка отчета безопасности
      uses: actions/upload-artifact@v3
      with:
        name: security-report
        path: bandit-report.json
        
  deploy:
    runs-on: ubuntu-latest
    needs: [test, security-check]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
    - name: 🚀 Деплой на Render
      run: |
        echo "🚀 Автоматический деплой на Render"
        echo "✅ Все тесты пройдены"
        echo "✅ Проверка безопасности завершена"
        echo "🔄 Render автоматически обновит приложение"
        
    - name: 📧 Уведомление о деплое
      run: |
        echo "🎉 Деплой завершен успешно!"
        echo "🌐 Сайт: https://examflow.ru"
        echo "🤖 Бот: @ExamFlowBot"
