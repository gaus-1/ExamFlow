name: 🔄 Автоматическое обновление данных ФИПИ и РешуЕГЭ

on:
  schedule:
    # Запускаем каждый день в 3:00 UTC (6:00 МСК)
    - cron: '0 3 * * *'
  
  workflow_dispatch:
    inputs:
      description:
        description: 'Запустить обновление данных ФИПИ и РешуЕГЭ'
        required: false
        default: 'Ручной запуск обновления данных'

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Клонирование репозитория
        uses: actions/checkout@v4
        
      - name: 🐍 Настройка Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: 📦 Установка зависимостей
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: 🔧 Настройка базы данных
        run: |
          # Создаем временную базу SQLite для тестирования
          python manage.py makemigrations
          python manage.py migrate
          
      - name: 🚀 Запуск обновления данных
        run: |
          python manage.py load_fipi_data --force
          
      - name: 📊 Проверка результатов
        run: |
          python manage.py shell -c "
          from learning.models import Subject, Task, Topic
          print(f'✅ Предметов: {Subject.objects.count()}')
          print(f'✅ Тем: {Topic.objects.count()}')
          print(f'✅ Заданий: {Task.objects.count()}')
          "
          
      - name: 📝 Создание отчета
        run: |
          echo "# 📊 Отчет обновления данных ФИПИ и РешуЕГЭ" > UPDATE_REPORT.md
          echo "" >> UPDATE_REPORT.md
          echo "**Дата:** $(date)" >> UPDATE_REPORT.md
          echo "**Время выполнения:** $(date -u)" >> UPDATE_REPORT.md
          echo "" >> UPDATE_REPORT.md
          
          python manage.py shell -c "
          from learning.models import Subject, Task, Topic
          with open('UPDATE_REPORT.md', 'a') as f:
              f.write(f'**Предметов:** {Subject.objects.count()}\n')
              f.write(f'**Тем:** {Topic.objects.count()}\n')
              f.write(f'**Заданий:** {Task.objects.count()}\n')
          "
          
      - name: 🔍 Проверка качества данных
        run: |
          python manage.py shell -c "
          from learning.models import Subject, Task
          
          # Проверяем предметы
          subjects = Subject.objects.all()
          print('📚 Проверка предметов:')
          for subject in subjects:
              task_count = Task.objects.filter(subject=subject).count()
              print(f'  {subject.name} ({subject.exam_type}): {task_count} заданий')
              
          # Проверяем задания
          tasks = Task.objects.all()
          print(f'\n📝 Всего заданий: {tasks.count()}')
          
          # Проверяем сложность
          difficulties = {}
          for task in tasks:
              difficulties[task.difficulty] = difficulties.get(task.difficulty, 0) + 1
          
          print('🎯 Распределение по сложности:')
          for diff, count in sorted(difficulties.items()):
              print(f'  Сложность {diff}: {count} заданий')
          "
          
      - name: 📤 Коммит обновленных данных
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Добавляем все изменения
          git add .
          
          # Коммитим с описанием
          git commit -m "🔄 Автоматическое обновление данных ФИПИ и РешуЕГЭ
          
          - Обновлено: $(date)
          - Предметов: $(python manage.py shell -c 'from learning.models import Subject; print(Subject.objects.count())')
          - Заданий: $(python manage.py shell -c 'from learning.models import Task; print(Task.objects.count())')
          - Источник: GitHub Actions
          "
          
      - name: 🚀 Пуш изменений
        run: |
          git push origin main
          
      - name: 📧 Уведомление о завершении
        if: always()
        run: |
          if [ ${{ job.status }} == 'success' ]; then
            echo "✅ Обновление данных завершено успешно!"
          else
            echo "❌ Ошибка при обновлении данных!"
          fi
          
      - name: 🗂️ Артефакты
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fipi-update-report
          path: |
            UPDATE_REPORT.md
            logs/
            
  notify-success:
    needs: update-data
    runs-on: ubuntu-latest
    if: success()
    
    steps:
      - name: 📧 Уведомление об успехе
        run: |
          echo "🎉 Обновление данных ФИПИ и РешуЕГЭ завершено успешно!"
          echo "📊 Данные обновлены автоматически"
          echo "🕐 Время: $(date)"
          
  notify-failure:
    needs: update-data
    runs-on: ubuntu-latest
    if: failure()
    
    steps:
      - name: 📧 Уведомление об ошибке
        run: |
          echo "❌ Ошибка при обновлении данных ФИПИ и РешуЕГЭ!"
          echo "🔍 Проверьте логи для диагностики"
          echo "🕐 Время: $(date)"
